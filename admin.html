<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>studio TSUZURI 管理画面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #333; padding: 16px; text-align: center; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 2px; color: #fff; }
    header p { font-size: 11px; color: #aaa; margin-top: 4px; }
    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #eee; overflow-x: auto; }
    .tab { flex-shrink: 0; padding: 12px 14px; text-align: center; font-size: 12px; cursor: pointer; color: #999; border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab.active { color: #333; border-bottom: 2px solid #333; font-weight: 600; }
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }
    .section-title { font-size: 13px; font-weight: 600; color: #777; margin-bottom: 12px; letter-spacing: 1px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .card-name { font-size: 16px; font-weight: 600; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .status-badge.pending { background: #fff3e0; color: #f57c00; }
    .status-badge.confirmed { background: #e8f5e9; color: #388e3c; }
    .status-badge.rejected { background: #fce4ec; color: #c62828; }
    .card-detail { font-size: 13px; color: #666; margin-bottom: 4px; }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-confirm { flex: 1; padding: 10px; background: #388e3c; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-reject { flex: 1; padding: 10px; background: #fff; color: #c62828; border: 1px solid #c62828; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .answers-block { margin-top: 8px; padding: 8px 12px; background: #f9f9f9; border-radius: 8px; }
    .answer-item { font-size: 12px; color: #666; margin-bottom: 3px; }
    .answer-item strong { color: #555; }
    .calendar { background: #fff; border-radius: 12px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px; }
    .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-nav button { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .day-header { font-size: 11px; color: #999; padding: 4px 0; }
    .day-header.sun { color: #e57373; }
    .day-header.sat { color: #64b5f6; }
    .day-cell { padding: 4px 2px; border-radius: 6px; font-size: 12px; min-height: 44px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .day-cell.sun .day-num { color: #e57373; }
    .day-cell.sat .day-num { color: #64b5f6; }
    .day-num { font-size: 12px; }
    .slot-tag { font-size: 9px; padding: 1px 4px; border-radius: 3px; width: 100%; text-align: center; }
    .slot-tag.available { background: #e8f5e9; color: #388e3c; }
    .slot-tag.partial { background: #fff3e0; color: #f57c00; }
    .slot-tag.closed { background: #f5f5f5; color: #bbb; }
    .schedule-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .schedule-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .schedule-date { font-size: 15px; font-weight: 600; }
    .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .slot-toggle { padding: 8px 4px; border-radius: 8px; font-size: 12px; text-align: center; cursor: pointer; border: 1px solid #eee; font-weight: 600; }
    .slot-toggle.available { background: #e8f5e9; color: #388e3c; border-color: #c8e6c9; }
    .slot-toggle.closed { background: #f5f5f5; color: #bbb; border-color: #eee; }
    .slot-toggle.pending { background: #fff3e0; color: #f57c00; border-color: #ffe0b2; cursor: not-allowed; }
    .slot-toggle.confirmed { background: #e3f2fd; color: #1565c0; border-color: #bbdefb; cursor: not-allowed; }
    .add-form { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: #777; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafafa; }
    .btn-primary { width: 100%; padding: 12px; background: #333; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-secondary { padding: 6px 12px; background: none; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; color: #666; cursor: pointer; }
    .btn-danger { padding: 6px 12px; background: none; border: 1px solid #e57373; border-radius: 6px; font-size: 12px; color: #e57373; cursor: pointer; }
    .btn-small { padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #555; }
    .menu-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .menu-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .menu-name { font-size: 15px; font-weight: 600; }
    .menu-desc { font-size: 12px; color: #999; margin-bottom: 10px; }
    .menu-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .question-card { background: #f9f9f9; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .question-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .question-title { font-size: 13px; font-weight: 600; flex: 1; margin-right: 8px; }
    .question-meta { font-size: 11px; color: #999; margin: 4px 0 6px; }
    .question-actions { display: flex; gap: 6px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-right: 4px; }
    .badge.required { background: #fce4ec; color: #c62828; }
    .badge.optional { background: #f5f5f5; color: #999; }
    .badge.enabled { background: #e8f5e9; color: #388e3c; }
    .badge.disabled { background: #f5f5f5; color: #bbb; }
    .badge.type { background: #e3f2fd; color: #1565c0; }
    .menu-questions-section { margin-top: 12px; border-top: 1px solid #eee; padding-top: 12px; }
    .menu-questions-title { font-size: 12px; font-weight: 600; color: #888; margin-bottom: 8px; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-number { font-size: 28px; font-weight: 700; color: #333; }
    .stat-label { font-size: 11px; color: #999; margin-top: 4px; }
    .chart-bar-container { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .chart-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 12px; }
    .bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
    .bar-label { width: 40px; font-size: 11px; color: #777; text-align: right; }
    .bar-track { flex: 1; background: #f0f0f0; border-radius: 4px; height: 20px; overflow: hidden; }
    .bar-fill { height: 100%; background: #81c784; border-radius: 4px; }
    .bar-value { width: 24px; font-size: 11px; color: #555; }
    .loading { text-align: center; padding: 40px; color: #999; font-size: 13px; }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 13px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .options-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .expand-btn { font-size: 12px; color: #888; background: none; border: none; cursor: pointer; padding: 4px 0; }
  </style>
</head>
<body>

<header>
  <h1>studio TSUZURI</h1>
  <p>管理画面</p>
</header>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('reservations', this)">予約一覧</div>
  <div class="tab" onclick="switchTab('calendar', this)">カレンダー</div>
  <div class="tab" onclick="switchTab('schedule', this)">営業日設定</div>
  <div class="tab" onclick="switchTab('menus', this)">メニュー設定</div>
  <div class="tab" onclick="switchTab('questions', this)">共通質問</div>
  <div class="tab" onclick="switchTab('stats', this)">分析</div>
</div>

<!-- 予約一覧 -->
<div class="tab-content active" id="tab-reservations">
  <div class="section-title">予約リクエスト一覧</div>
  <div id="reservationList"><div class="loading">読み込み中...</div></div>
</div>

<!-- カレンダー -->
<div class="tab-content" id="tab-calendar">
  <div class="calendar">
    <div class="calendar-nav">
      <button onclick="adminChangeMonth(-1)">&#8249;</button>
      <span id="adminMonthLabel" style="font-size:15px;font-weight:600;"></span>
      <button onclick="adminChangeMonth(1)">&#8250;</button>
    </div>
    <div class="calendar-grid" id="adminCalendarGrid"></div>
  </div>
</div>

<!-- 営業日設定 -->
<div class="tab-content" id="tab-schedule">
  <div class="add-form">
    <div class="section-title">営業日を追加</div>
    <div class="form-group">
      <label>日付</label>
      <input type="date" id="scheduleDate">
    </div>
    <button class="btn-primary" onclick="addSchedule()">追加する（全枠空きで登録）</button>
  </div>
  <div id="scheduleList"><div class="loading">読み込み中...</div></div>
</div>

<!-- メニュー設定 -->
<div class="tab-content" id="tab-menus">
  <div class="add-form">
    <div class="section-title">メニューを追加</div>
    <div class="form-group">
      <label>メニュー名 *</label>
      <input type="text" id="menuName" placeholder="例：お宮参り">
    </div>
    <div class="form-group">
      <label>説明（任意）</label>
      <input type="text" id="menuDesc" placeholder="例：生後1ヶ月前後のお子様の撮影">
    </div>
    <button class="btn-primary" onclick="addMenu()">メニューを追加する</button>
  </div>
  <div class="section-title">メニュー一覧</div>
  <div id="menuList"><div class="loading">読み込み中...</div></div>
</div>

<!-- 共通質問 -->
<div class="tab-content" id="tab-questions">
  <div class="add-form">
    <div class="section-title">共通質問を追加（全メニュー共通）</div>
    <div class="form-group">
      <label>質問文 *</label>
      <input type="text" id="qQuestion" placeholder="例：ご要望があればお書きください">
    </div>
    <div class="form-group">
      <label>回答形式 *</label>
      <select id="qType" onchange="toggleOptionsField('qOptions', 'qType')">
        <option value="テキスト">テキスト入力（自由記述）</option>
        <option value="プルダウン">プルダウン選択</option>
        <option value="ラジオ">ラジオボタン（1つ選択）</option>
        <option value="チェック">チェックボックス（複数選択）</option>
      </select>
    </div>
    <div class="form-group" id="qOptionsWrap" style="display:none;">
      <label>選択肢（カンマ区切り）*</label>
      <input type="text" id="qOptions" placeholder="例：希望する,不要">
      <div class="options-hint">カンマ（,）で区切って入力してください</div>
    </div>
    <div class="form-group">
      <label>必須/任意</label>
      <select id="qRequired">
        <option value="任意">任意</option>
        <option value="必須">必須</option>
      </select>
    </div>
    <button class="btn-primary" onclick="addCommonQuestion()">共通質問を追加する</button>
  </div>
  <div class="section-title">共通質問一覧</div>
  <div id="questionList"><div class="loading">読み込み中...</div></div>
</div>

<!-- 分析 -->
<div class="tab-content" id="tab-stats">
  <div class="stats-grid" id="statsGrid"><div class="loading">読み込み中...</div></div>
  <div class="chart-bar-container" id="chartContainer" style="display:none;">
    <div class="chart-title">時間帯別 確定数</div>
    <div id="timeChart"></div>
  </div>
</div>

<!-- 編集モーダル（共通質問） -->
<div class="modal-overlay" id="editQuestionModal">
  <div class="modal">
    <h3>質問を編集</h3>
    <input type="hidden" id="editQId">
    <div class="form-group"><label>質問文 *</label><input type="text" id="editQQuestion"></div>
    <div class="form-group">
      <label>回答形式 *</label>
      <select id="editQType" onchange="toggleOptionsField('editQOptions', 'editQType')">
        <option value="テキスト">テキスト入力</option>
        <option value="プルダウン">プルダウン選択</option>
        <option value="ラジオ">ラジオボタン</option>
        <option value="チェック">チェックボックス</option>
      </select>
    </div>
    <div class="form-group" id="editQOptionsWrap">
      <label>選択肢（カンマ区切り）</label>
      <input type="text" id="editQOptions">
    </div>
    <div class="form-group"><label>必須/任意</label><select id="editQRequired"><option value="任意">任意</option><option value="必須">必須</option></select></div>
    <div class="form-group"><label>有効/無効</label><select id="editQEnabled"><option value="有効">有効</option><option value="無効">無効</option></select></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveCommonQuestion()" style="flex:1;">保存</button>
      <button class="btn-secondary" onclick="closeModal('editQuestionModal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- メニュー編集モーダル -->
<div class="modal-overlay" id="editMenuModal">
  <div class="modal">
    <h3>メニューを編集</h3>
    <input type="hidden" id="editMenuId">
    <div class="form-group"><label>メニュー名 *</label><input type="text" id="editMenuName"></div>
    <div class="form-group"><label>説明（任意）</label><input type="text" id="editMenuDesc"></div>
    <div class="form-group"><label>有効/無効</label><select id="editMenuEnabled"><option value="有効">有効</option><option value="無効">無効</option></select></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveMenu()" style="flex:1;">保存</button>
      <button class="btn-secondary" onclick="closeModal('editMenuModal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- メニュー別質問追加モーダル -->
<div class="modal-overlay" id="addMenuQuestionModal">
  <div class="modal">
    <h3 id="addMQTitle">質問を追加</h3>
    <input type="hidden" id="addMQMenuId">
    <div class="form-group"><label>質問文 *</label><input type="text" id="addMQQuestion" placeholder="例：お子様の年齢は？"></div>
    <div class="form-group">
      <label>回答形式 *</label>
      <select id="addMQType" onchange="toggleOptionsField('addMQOptions', 'addMQType')">
        <option value="テキスト">テキスト入力</option>
        <option value="プルダウン">プルダウン選択</option>
        <option value="ラジオ">ラジオボタン</option>
        <option value="チェック">チェックボックス</option>
      </select>
    </div>
    <div class="form-group" id="addMQOptionsWrap" style="display:none;">
      <label>選択肢（カンマ区切り）*</label>
      <input type="text" id="addMQOptions" placeholder="例：0歳,1歳,2歳,3歳以上">
      <div class="options-hint">カンマ（,）で区切って入力してください</div>
    </div>
    <div class="form-group"><label>必須/任意</label><select id="addMQRequired"><option value="任意">任意</option><option value="必須">必須</option></select></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveMenuQuestion()" style="flex:1;">追加する</button>
      <button class="btn-secondary" onclick="closeModal('addMenuQuestionModal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- メニュー別質問編集モーダル -->
<div class="modal-overlay" id="editMenuQuestionModal">
  <div class="modal">
    <h3>質問を編集</h3>
    <input type="hidden" id="editMQId">
    <div class="form-group"><label>質問文 *</label><input type="text" id="editMQQuestion"></div>
    <div class="form-group">
      <label>回答形式 *</label>
      <select id="editMQType" onchange="toggleOptionsField('editMQOptions', 'editMQType')">
        <option value="テキスト">テキスト入力</option>
        <option value="プルダウン">プルダウン選択</option>
        <option value="ラジオ">ラジオボタン</option>
        <option value="チェック">チェックボックス</option>
      </select>
    </div>
    <div class="form-group" id="editMQOptionsWrap">
      <label>選択肢（カンマ区切り）</label>
      <input type="text" id="editMQOptions">
    </div>
    <div class="form-group"><label>必須/任意</label><select id="editMQRequired"><option value="任意">任意</option><option value="必須">必須</option></select></div>
    <div class="form-group"><label>有効/無効</label><select id="editMQEnabled"><option value="有効">有効</option><option value="無効">無効</option></select></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveMenuQuestionEdit()" style="flex:1;">保存</button>
      <button class="btn-secondary" onclick="closeModal('editMenuQuestionModal')">キャンセル</button>
    </div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxn4C3CA9LMiexP5dHL3-_3ixpIfnbLgU1kisdxuzM3TaIPmMk_uhCSigXPNhJ6jEg/exec';
  const TIME_SLOTS = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00'];

  let adminYear, adminMonth;
  let allReservations = [], allSchedule = [], allMenus = [], allMenuQuestions = [], allCommonQuestions = [];

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('active'); }

  function toggleOptionsField(optionsId, typeId) {
    const type = document.getElementById(typeId).value;
    const wrapId = optionsId + 'Wrap';
    const wrap = document.getElementById(wrapId);
    if (wrap) wrap.style.display = ['プルダウン','ラジオ','チェック'].includes(type) ? 'block' : 'none';
  }

  async function init() {
    const now = new Date();
    adminYear = now.getFullYear();
    adminMonth = now.getMonth() + 1;
    await Promise.all([loadReservations(), loadScheduleData(), loadMenus(), loadCommonQuestions()]);
    renderAdminCalendar();
    renderStats();
  }

  // ==========================================
  // 予約関連
  // ==========================================
  function loadReservations() {
    return new Promise((resolve) => {
      const cb = 'cb_res_' + Date.now();
      const s = document.createElement('script');
      window[cb] = (json) => {
        allReservations = json.data || [];
        renderReservations();
        if (document.body.contains(s)) document.body.removeChild(s);
        delete window[cb]; resolve();
      };
      s.src = `${GAS_URL}?action=getReservations&callback=${cb}`;
      document.body.appendChild(s);
    });
  }

  function renderReservations() {
    const list = document.getElementById('reservationList');
    const sorted = [...allReservations.filter(r => r.status === '仮押さえ'), ...allReservations.filter(r => r.status !== '仮押さえ')];
    if (sorted.length === 0) { list.innerHTML = '<div class="empty">予約データがありません</div>'; return; }

    list.innerHTML = sorted.map(r => {
      const menuBlock = r.menuAnswers && r.menuAnswers.length > 0
        ? `<div class="answers-block">${r.menuAnswers.map(a => `<div class="answer-item"><strong>${a.question}：</strong>${Array.isArray(a.answer) ? a.answer.join('、') : a.answer}</div>`).join('')}</div>` : '';
      const commonBlock = r.commonAnswers && r.commonAnswers.length > 0
        ? `<div class="answers-block">${r.commonAnswers.map(a => `<div class="answer-item"><strong>${a.question}：</strong>${Array.isArray(a.answer) ? a.answer.join('、') : a.answer}</div>`).join('')}</div>` : '';

      return `<div class="card">
        <div class="card-header"><div class="card-name">${r.name}</div><div class="status-badge ${r.status === '仮押さえ' ? 'pending' : r.status === '確定' ? 'confirmed' : 'rejected'}">${r.status}</div></div>
        <div class="card-detail">📅 ${r.date}　🕐 ${r.timeSlot}〜</div>
        <div class="card-detail">📞 ${r.phone || '-'}</div>
        <div class="card-detail">🎯 ${r.menu || '-'}　👥 ${r.count || '-'}</div>
        ${menuBlock}${commonBlock}
        ${r.note ? `<div class="card-detail">📝 ${r.note}</div>` : ''}
        <div class="card-detail" style="color:#bbb;font-size:11px;">リクエスト：${r.requestedAt}</div>
        ${r.status === '仮押さえ' ? `<div class="card-actions"><button class="btn-confirm" onclick="updateStatus('${r.id}','確定')">✓ 確定</button><button class="btn-reject" onclick="updateStatus('${r.id}','不可')">✗ 不可</button></div>` : ''}
      </div>`;
    }).join('');

  async function updateStatus(reservationId, status) {
    if (!confirm(`「${status}」にしますか？お客様にLINEで通知されます。`)) return;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'updateReservation', reservationId, status }) });
      const json = await res.json();
      if (json.status === 'success') {
        alert(`「${status}」に更新し通知しました。`);
        await Promise.all([loadReservations(), loadScheduleData()]);
        renderAdminCalendar(); renderStats();
      } else alert('エラーが発生しました。');
    } catch (e) { alert('通信エラーが発生しました。'); }
  }

  // ==========================================
  // 営業日関連
  // ==========================================
  function loadScheduleData() {
    return new Promise((resolve) => {
      const cb = 'cb_sch_' + Date.now();
      const s = document.createElement('script');
      window[cb] = (json) => {
        allSchedule = json.data || [];
        renderScheduleList();
        if (document.body.contains(s)) document.body.removeChild(s);
        delete window[cb]; resolve();
      };
      s.src = `${GAS_URL}?action=getAllSchedule&callback=${cb}`;
      document.body.appendChild(s);
    });
  }

  function renderScheduleList() {
    const list = document.getElementById('scheduleList');
    if (allSchedule.length === 0) { list.innerHTML = '<div class="empty">営業日データがありません</div>'; return; }
    list.innerHTML = allSchedule.map(s => `
      <div class="schedule-card">
        <div class="schedule-card-header">
          <div class="schedule-date">${s.date}</div>
          <button class="btn-danger" style="padding:4px 10px;font-size:12px;" onclick="deleteSchedule('${s.date}')">削除</button>
        </div>
        <div class="slot-grid">
          ${TIME_SLOTS.map(t => {
            const status = s.slots[t] || '空き';
            const cls = status === '空き' ? 'available' : status === '仮押さえ' ? 'pending' : status === '確定' ? 'confirmed' : 'closed';
            const clickable = (status === '空き' || status === '不可') ? `onclick="toggleSlot('${s.date}','${t}','${status}')"` : '';
            return `<div class="slot-toggle ${cls}" ${clickable}>${t}<br><span style="font-size:9px;font-weight:400;">${status === '空き' ? '空き' : status === '不可' ? '不可' : status}</span></div>`;
          }).join('')}
        </div>
      </div>`).join('');
  }

  async function toggleSlot(date, timeSlot, currentStatus) {
    const newStatus = currentStatus === '空き' ? '不可' : '空き';
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'updateSlot', date, timeSlot, status: newStatus }) });
      const json = await res.json();
      if (json.status === 'success') { await loadScheduleData(); renderAdminCalendar(); }
    } catch (e) { alert('通信エラーが発生しました。'); }
  }

  async function addSchedule() {
    const date = document.getElementById('scheduleDate').value;
    if (!date) { alert('日付を選択してください。'); return; }
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'addSchedule', date }) });
      const json = await res.json();
      if (json.status === 'success') { document.getElementById('scheduleDate').value = ''; await loadScheduleData(); renderAdminCalendar(); }
      else alert(json.message || 'エラーが発生しました。');
    } catch (e) { alert('通信エラーが発生しました。'); }
  }

  async function deleteSchedule(date) {
    if (!confirm(`${date} の営業日を削除しますか？`)) return;
    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteSchedule', date }) });
      const json = await res.json();
      if (json.status === 'success') { await loadScheduleData(); renderAdminCalendar(); }
    } catch (e) { alert('通信エラーが発生しました。'); }
  }

  // ==========================================
  // カレンダー
  // ==========================================
  function renderAdminCalendar() {
    const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('adminMonthLabel').textContent = `${adminYear}年 ${monthNames[adminMonth-1]}`;
    const grid = document.getElementById('adminCalendarGrid');
    grid.innerHTML = '';
    ['日','月','火','水','木','金','土'].forEach((d,i) => {
      const el = document.createElement('div');
      el.className = `day-header ${i===0?'sun':i===6?'sat':''}`;
      el.textContent = d; grid.appendChild(el);
    });
    const firstDay = new Date(adminYear, adminMonth-1, 1).getDay();
    const daysInMonth = new Date(adminYear, adminMonth, 0).getDate();
    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${adminYear}-${String(adminMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const s = allSchedule.find(x => x.date === dateStr);
      const dow = new Date(adminYear, adminMonth-1, d).getDay();
      const cell = document.createElement('div');
      cell.className = `day-cell${dow===0?' sun':dow===6?' sat':''}`;
      const numEl = document.createElement('div');
      numEl.className = 'day-num'; numEl.textContent = d; cell.appendChild(numEl);
      if (s) {
        const slots = Object.values(s.slots);
        const availCount = slots.filter(v => v === '空き').length;
        const tag = document.createElement('div');
        tag.className = `slot-tag ${availCount===slots.length?'available':availCount>0?'partial':'closed'}`;
        tag.textContent = `${availCount}枠`; cell.appendChild(tag);
      }
      grid.appendChild(cell);
    }
  }

  function adminChangeMonth(delta) {
    adminMonth += delta;
    if (adminMonth > 12) { adminMonth = 1; adminYear++; }
    if (adminMonth < 1) { adminMonth = 12; adminYear--; }
    renderAdminCalendar();
  }

  // ==========================================
  // 分析
  // ==========================================
  function renderStats() {
    const total = allReservations.length;
    const confirmed = allReservations.filter(r => r.status === '確定').length;
    const pending = allReservations.filter(r => r.status === '仮押さえ').length;
    const rejected = allReservations.filter(r => r.status === '不可').length;
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">総リクエスト数</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#388e3c;">${confirmed}</div><div class="stat-label">確定数</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#f57c00;">${pending}</div><div class="stat-label">仮押さえ中</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#c62828;">${rejected}</div><div class="stat-label">不可数</div></div>`;
    const timeCounts = {};
    TIME_SLOTS.forEach(t => { timeCounts[t] = 0; });
    allReservations.filter(r => r.status === '確定').forEach(r => { if (timeCounts[r.timeSlot] !== undefined) timeCounts[r.timeSlot]++; });
    const max = Math.max(...Object.values(timeCounts), 1);
    document.getElementById('timeChart').innerHTML = TIME_SLOTS.map(t => `
      <div class="bar-row">
        <div class="bar-label">${t}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(timeCounts[t]/max)*100}%"></div></div>
        <div class="bar-value">${timeCounts[t]}</div>
      </div>`).join('');
    document.getElementById('chartContainer').style.display = 'block';
  }

  init();
