<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>studio TSUZURI 予約</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fafafa; color: #333; }
    header { background: #fff; padding: 16px; text-align: center; border-bottom: 1px solid #eee; }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: 2px; color: #555; }
    header p { font-size: 12px; color: #999; margin-top: 4px; }
    .container { padding: 16px; }
    .section-title { font-size: 16px; font-weight: 700; color: #555; margin: 20px 0 10px; letter-spacing: 1px; text-align: center; }
    .notice { background: #f9f5f0; border-left: 3px solid #c8a97e; padding: 10px 14px; border-radius: 6px; font-size: 12px; color: #777; line-height: 1.7; margin-bottom: 16px; }
    .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-nav button { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 16px; }
    .calendar-nav span { font-size: 16px; font-weight: 600; }
    .calendar { background: #fff; border-radius: 12px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .day-header { font-size: 11px; color: #999; padding: 4px 0; }
    .day-header.sun { color: #e57373; }
    .day-header.sat { color: #64b5f6; }
    .day-cell { padding: 6px 2px; border-radius: 8px; font-size: 13px; min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 2px; }
    .day-cell.clickable { cursor: pointer; }
    .day-cell.clickable:active { background: #f0f0f0; }
    .day-cell.past { opacity: 0.35; }
    .day-cell.sun .day-num, .day-cell.hol .day-num { color: #e57373; }
    .day-cell.sat .day-num { color: #64b5f6; }
    .day-num { font-size: 13px; font-weight: 500; }
    .day-dot { width: 8px; height: 8px; border-radius: 50%; }
    .day-dot.available { background: #81c784; }
    .day-dot.partial { background: #ffb74d; }
    .day-dot.full { background: #e0e0e0; }
    .legend { display: flex; margin-top: 16px; justify-content: center; flex-wrap: wrap; gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; background: #f5f5f5; padding: 5px 10px; border-radius: 20px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.available { background: #81c784; }
    .legend-dot.partial { background: #ffb74d; }
    .legend-dot.full { background: #e0e0e0; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: flex-end; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-height: 88vh; overflow-y: auto; }
    .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; color: #444; }
    .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .time-btn { padding: 14px 8px; border: 2px solid #eee; border-radius: 10px; background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; color: #333; }
    .time-btn:disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; border-color: #f0f0f0; }
    .time-btn.pending { border-color: #ffb74d; background: #fff8f0; color: #999; cursor: not-allowed; }
    .time-status { font-size: 10px; font-weight: 400; margin-top: 2px; color: #aaa; }
    .time-btn.pending .time-status { color: #ffb74d; }
    .menu-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .menu-btn { padding: 16px; border: 2px solid #eee; border-radius: 12px; background: #fff; font-size: 15px; font-weight: 600; cursor: pointer; text-align: left; color: #333; transition: all 0.15s; }
    .menu-btn:active { background: #f5f5f5; }
    .menu-btn.selected { border-color: #81c784; background: #f1f8f1; }
    .menu-btn-desc { font-size: 12px; color: #aaa; font-weight: 400; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #777; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #fafafa; }
    .radio-group, .check-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-item, .check-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; cursor: pointer; font-size: 14px; }
    .radio-item input, .check-item input { width: auto; margin: 0; accent-color: #555; }
    .selected-info { background: #f1f8f1; border: 1px solid #c8e6c9; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; color: #555; }
    .selected-info strong { color: #388e3c; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }
    .menu-questions-block { background: #f9f5f0; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
    .menu-questions-label { font-size: 12px; color: #c8a97e; font-weight: 600; margin-bottom: 10px; }
    .btn-primary { display: block; width: 100%; padding: 16px; background: #555; color: #fff; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 20px; letter-spacing: 1px; font-weight: 600; }
    .btn-back { display: block; width: 100%; padding: 12px; background: none; color: #999; border: none; font-size: 14px; cursor: pointer; margin-top: 8px; }
    .loading { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #aaa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .complete-screen { display: none; text-align: center; padding: 60px 24px; }
    .complete-screen.active { display: block; }
    .complete-icon { font-size: 64px; margin-bottom: 20px; }
    .complete-screen h2 { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #444; }
    .complete-screen p { font-size: 14px; color: #777; line-height: 1.8; }
  </style>
</head>
<body>

<header>
  <h1>studio TSUZURI</h1>
  <p>撮影日のご予約</p>
</header>

<div class="container" id="mainContent">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    読み込み中...
  </div>

  <div id="calendarSection" style="display:none;">
    <div class="section-title">撮影予約カレンダー</div>
    <div class="notice">
      📌 こちらのカレンダーから希望日時をお選びいただき、予約リクエストを送信してください。<br>
      リクエスト送信後は<strong>仮押さえ</strong>となり、店舗からの確定連絡をもって正式な予約確定となります。
    </div>
    <div class="calendar-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="calendar">
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot available"></div>空きあり</div>
        <div class="legend-item"><div class="legend-dot partial"></div>一部仮押さえ</div>
        <div class="legend-item"><div class="legend-dot full"></div>満員/不可</div>
      </div>
    </div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>

    <!-- Step1: 時間枠選択 -->
    <div id="stepTimeSlot">
      <h2 id="modalTitle"></h2>
      <div class="time-grid" id="timeGrid"></div>
      <button class="btn-back" onclick="closeModal()">キャンセル</button>
    </div>

    <!-- Step2: メニュー選択 -->
    <div id="stepMenu" style="display:none;">
      <h2>撮影メニューを選択</h2>
      <div class="selected-info" id="selectedTimeInfo"></div>
      <div class="menu-grid" id="menuGrid"></div>
      <button class="btn-back" onclick="backToTimeSlot()">← 時間枠を選び直す</button>
    </div>

    <!-- Step3: 予約フォーム -->
    <div id="stepForm" style="display:none;">
      <h2>予約情報のご入力</h2>
      <div class="selected-info" id="selectedInfo"></div>

      <div class="form-group">
        <label>お名前 *</label>
        <input type="text" id="inputName" placeholder="例：山田 花子">
      </div>
      <div class="form-group">
        <label>電話番号 *</label>
        <input type="tel" id="inputPhone" placeholder="例：090-1234-5678">
      </div>
      <div class="form-group">
        <label>撮影人数 *</label>
        <select id="inputCount">
          <option value="">選択してください</option>
          <option>1名</option>
          <option>2名</option>
          <option>3名</option>
          <option>4名</option>
          <option>5名以上</option>
        </select>
      </div>

      <!-- メニュー別質問 -->
      <div id="menuQuestionsBlock" style="display:none;">
        <hr class="divider">
        <div class="menu-questions-block">
          <div class="menu-questions-label" id="menuQuestionsLabel"></div>
          <div id="menuQuestions"></div>
        </div>
      </div>

      <hr class="divider">

      <!-- 共通質問 -->
      <div id="commonQuestions"></div>

      <div class="form-group">
        <label>ご要望・ご質問（任意）</label>
        <textarea id="inputNote" rows="3" placeholder="自由にご記入ください"></textarea>
      </div>

      <button class="btn-primary" onclick="submitReservation()">予約リクエストを送信</button>
      <button class="btn-back" onclick="backToMenu()">← メニューを選び直す</button>
    </div>
  </div>
</div>

<!-- 完了画面 -->
<div class="complete-screen" id="completeScreen">
  <div class="complete-icon">📅</div>
  <h2>リクエスト送信完了</h2>
  <p>予約リクエストを受け付けました。<br>店舗にて確認後、LINEにてご連絡いたします。<br><br>確定連絡をもって正式な予約となります。<br>しばらくお待ちください。</p>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxn4C3CA9LMiexP5dHL3-_3ixpIfnbLgU1kisdxuzM3TaIPmMk_uhCSigXPNhJ6jEg/exec';
  const LIFF_ID = '2009277586-pDtkyCOn';

  const HOLIDAYS = [
    '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
    '2026-03-20','2026-04-29','2026-05-03','2026-05-04',
    '2026-05-05','2026-05-06','2026-07-20','2026-08-11',
    '2026-09-21','2026-09-22','2026-09-23','2026-10-12',
    '2026-11-03','2026-11-23','2026-12-23',
  ];

  let currentYear, currentMonth;
  let scheduleData = {};
  let menus = [];
  let menuQuestions = {};
  let commonQuestions = [];
  let selectedDate = null;
  let selectedTimeSlot = null;
  let selectedMenu = null;
  let lineProfile = null;
  let isLoading = false;

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      lineProfile = await liff.getProfile();

      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth() + 1;

      await Promise.all([loadSchedule(), loadFormData()]);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('calendarSection').style.display = 'block';
    } catch (err) {
      document.getElementById('loading').innerHTML = `<p style="color:#e57373;">エラーが発生しました。<br>${err.message}</p>`;
    }
  }

  function loadSchedule() {
    if (isLoading) return Promise.resolve();
    isLoading = true;
    const month = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
    return new Promise((resolve) => {
      const cb = 'cb_sch_' + Date.now();
      const s = document.createElement('script');
      const timer = setTimeout(() => { isLoading = false; resolve(); }, 8000);
      window[cb] = function(json) {
        clearTimeout(timer);
        scheduleData = {};
        if (json.status === 'success') json.data.forEach(d => { scheduleData[d.date] = d; });
        if (document.body.contains(s)) document.body.removeChild(s);
        delete window[cb];
        renderCalendar();
        isLoading = false;
        resolve();
      };
      s.src = `${GAS_URL}?action=getSchedule&month=${month}&callback=${cb}`;
      s.onerror = () => { clearTimeout(timer); isLoading = false; resolve(); };
      document.body.appendChild(s);
    });
  }

  function loadFormData() {
    return new Promise((resolve) => {
      const cb = 'cb_fd_' + Date.now();
      const s = document.createElement('script');
      const timer = setTimeout(() => { resolve(); }, 8000);
      window[cb] = function(json) {
        clearTimeout(timer);
        if (json.status === 'success') {
          menus = json.menus || [];
          commonQuestions = json.commonQuestions || [];
        }
        if (document.body.contains(s)) document.body.removeChild(s);
        delete window[cb];
        resolve();
      };
      s.src = `${GAS_URL}?action=getFormData&callback=${cb}`;
      s.onerror = () => { clearTimeout(timer); resolve(); };
      document.body.appendChild(s);
    });
  }

  function loadMenuQuestions(menuId) {
    if (menuQuestions[menuId]) return Promise.resolve();
    return new Promise((resolve) => {
      const cb = 'cb_mq_' + Date.now();
      const s = document.createElement('script');
      const timer = setTimeout(() => { menuQuestions[menuId] = []; resolve(); }, 8000);
      window[cb] = function(json) {
        clearTimeout(timer);
        menuQuestions[menuId] = json.status === 'success' ? json.data : [];
        if (document.body.contains(s)) document.body.removeChild(s);
        delete window[cb];
        resolve();
      };
      s.src = `${GAS_URL}?action=getMenuQuestions&menuId=${menuId}&callback=${cb}`;
      s.onerror = () => { clearTimeout(timer); menuQuestions[menuId] = []; resolve(); };
      document.body.appendChild(s);
    });
  }

  function renderCalendar() {
    const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('monthLabel').textContent = `${currentYear}年 ${monthNames[currentMonth-1]}`;
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    ['日','月','火','水','木','金','土'].forEach((d,i) => {
      const el = document.createElement('div');
      el.className = `day-header ${i===0?'sun':i===6?'sat':''}`;
      el.textContent = d; grid.appendChild(el);
    });
    const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);
    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dateObj = new Date(currentYear, currentMonth-1, d);
      const dow = dateObj.getDay();
      const isPast = dateObj < today;
      const isHoliday = HOLIDAYS.includes(dateStr);
      const cell = document.createElement('div');
      let cellClass = 'day-cell';
      if (dow === 0 || isHoliday) cellClass += ' sun';
      else if (dow === 6) cellClass += ' sat';
      if (isPast) cellClass += ' past';
      if (isHoliday) cellClass += ' hol';
      const numEl = document.createElement('div');
      numEl.className = 'day-num'; numEl.textContent = d; cell.appendChild(numEl);
      if (!isPast && scheduleData[dateStr]) {
        const s = scheduleData[dateStr];
        const slotValues = Object.values(s.slots);
        const availableCount = slotValues.filter(v => v === '空き').length;
        const dot = document.createElement('div');
        dot.className = 'day-dot';
        if (availableCount === slotValues.length) dot.classList.add('available');
        else if (availableCount > 0) dot.classList.add('partial');
        else dot.classList.add('full');
        cell.appendChild(dot);
        if (availableCount > 0) {
          cellClass += ' clickable';
          cell.onclick = () => openModal(dateStr, s);
        }
      }
      cell.className = cellClass;
      grid.appendChild(cell);
    }
  }

  async function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#aaa;font-size:13px;"><div class="loading-spinner" style="margin:0 auto 8px;"></div>読み込み中...</div>';
    await loadSchedule();
  }

  function openModal(dateStr, slotData) {
    selectedDate = dateStr;
    const [year, month, day] = dateStr.split('-');
    document.getElementById('modalTitle').textContent = `${year}年${parseInt(month)}月${parseInt(day)}日`;
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = '';
    ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00'].forEach(t => {
      const status = slotData.slots[t] || '空き';
      const btn = document.createElement('button');
      btn.className = `time-btn ${status === '仮押さえ' ? 'pending' : ''}`;
      let statusLabel = status === '仮押さえ' ? '仮押さえ中' : status !== '空き' ? '予約不可' : '';
      btn.innerHTML = `${t}<div class="time-status">${statusLabel}</div>`;
      btn.disabled = status !== '空き';
      if (status === '空き') btn.onclick = () => selectTimeSlot(t);
      grid.appendChild(btn);
    });
    document.getElementById('stepTimeSlot').style.display = 'block';
    document.getElementById('stepMenu').style.display = 'none';
    document.getElementById('stepForm').style.display = 'none';
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    selectedDate = null; selectedTimeSlot = null; selectedMenu = null;
  }

  function selectTimeSlot(slot) {
    selectedTimeSlot = slot;
    const [year, month, day] = selectedDate.split('-');
    document.getElementById('selectedTimeInfo').innerHTML =
      `📅 <strong>${year}年${parseInt(month)}月${parseInt(day)}日 ${slot}〜</strong>`;

    if (menus.length === 0) {
      selectedMenu = { id: '', name: '' };
      showForm();
      return;
    }

    const grid = document.getElementById('menuGrid');
    grid.innerHTML = menus.map(m => `
      <button class="menu-btn" onclick="selectMenu('${m.id}', '${m.name}')">
        ${m.name}
        ${m.description ? `<div class="menu-btn-desc">${m.description}</div>` : ''}
      </button>
    `).join('');

    document.getElementById('stepTimeSlot').style.display = 'none';
    document.getElementById('stepMenu').style.display = 'block';
    document.getElementById('stepForm').style.display = 'none';
  }

  async function selectMenu(menuId, menuName) {
    selectedMenu = { id: menuId, name: menuName };
    await loadMenuQuestions(menuId);
    showForm();
  }

  function showForm() {
    const [year, month, day] = selectedDate.split('-');
    document.getElementById('selectedInfo').innerHTML =
      `📅 <strong>${year}年${parseInt(month)}月${parseInt(day)}日 ${selectedTimeSlot}〜</strong>　🎯 <strong>${selectedMenu.name}</strong>`;

    const mqs = menuQuestions[selectedMenu.id] || [];
    if (mqs.length > 0) {
      document.getElementById('menuQuestionsLabel').textContent = `📋 ${selectedMenu.name}についてお聞かせください`;
      document.getElementById('menuQuestions').innerHTML = renderQuestionFields(mqs, 'mq');
      document.getElementById('menuQuestionsBlock').style.display = 'block';
    } else {
      document.getElementById('menuQuestionsBlock').style.display = 'none';
    }

    document.getElementById('commonQuestions').innerHTML =
      commonQuestions.length > 0 ? renderQuestionFields(commonQuestions, 'cq') : '';

    document.getElementById('stepTimeSlot').style.display = 'none';
    document.getElementById('stepMenu').style.display = 'none';
    document.getElementById('stepForm').style.display = 'block';
  }

  function renderQuestionFields(questions, prefix) {
    return questions.map((q, idx) => {
      const labelText = `${q.question}${q.required ? ' *' : '<span style="font-size:11px;color:#aaa;margin-left:4px;">任意</span>'}`;

      if (q.type === 'テキスト') {
        return `<div class="form-group"><label>${labelText}</label><input type="text" id="${prefix}_${idx}" placeholder="ご記入ください"></div>`;
      }
      if (q.type === 'プルダウン') {
        const opts = q.options.map(o => `<option value="${o}">${o}</option>`).join('');
        return `<div class="form-group"><label>${labelText}</label><select id="${prefix}_${idx}"><option value="">選択してください</option>${opts}</select></div>`;
      }
      if (q.type === 'ラジオ') {
        const opts = q.options.map(o => `<label class="radio-item"><input type="radio" name="${prefix}_${idx}" value="${o}"> ${o}</label>`).join('');
        return `<div class="form-group"><label>${labelText}</label><div class="radio-group">${opts}</div></div>`;
      }
      if (q.type === 'チェック') {
        const opts = q.options.map(o => `<label class="check-item"><input type="checkbox" name="${prefix}_${idx}" value="${o}"> ${o}</label>`).join('');
        return `<div class="form-group"><label>${labelText}</label><div class="check-group">${opts}</div></div>`;
      }
      return '';
    }).join('');
  }

  function getAnswers(questions, prefix) {
    return questions.map((q, idx) => {
      let answer = '';
      if (q.type === 'テキスト' || q.type === 'プルダウン') {
        const el = document.getElementById(`${prefix}_${idx}`);
        answer = el ? el.value : '';
      } else if (q.type === 'ラジオ') {
        const checked = document.querySelector(`input[name="${prefix}_${idx}"]:checked`);
        answer = checked ? checked.value : '';
      } else if (q.type === 'チェック') {
        answer = Array.from(document.querySelectorAll(`input[name="${prefix}_${idx}"]:checked`)).map(c => c.value);
      }
      return { question: q.question, answer, required: q.required };
    });
  }

  function backToTimeSlot() {
    document.getElementById('stepTimeSlot').style.display = 'block';
    document.getElementById('stepMenu').style.display = 'none';
    document.getElementById('stepForm').style.display = 'none';
  }

  function backToMenu() {
    if (menus.length === 0) { backToTimeSlot(); return; }
    document.getElementById('stepTimeSlot').style.display = 'none';
    document.getElementById('stepMenu').style.display = 'block';
    document.getElementById('stepForm').style.display = 'none';
  }

  async function submitReservation() {
    const name = document.getElementById('inputName').value.trim();
    const phone = document.getElementById('inputPhone').value.trim();
    const count = document.getElementById('inputCount').value;
    const note = document.getElementById('inputNote').value.trim();

    if (!name || !phone || !count) { alert('必須項目をすべて入力してください。'); return; }

    const mqs = menuQuestions[selectedMenu.id] || [];
    const menuAnswers = getAnswers(mqs, 'mq');
    const commonAnswers = getAnswers(commonQuestions, 'cq');

    for (const a of [...menuAnswers, ...commonAnswers]) {
      if (a.required) {
        const isEmpty = Array.isArray(a.answer) ? a.answer.length === 0 : !a.answer;
        if (isEmpty) { alert(`「${a.question}」は必須項目です。`); return; }
      }
    }

    const params = {
      action: 'createReservation',
      lineUserId: lineProfile.userId,
      name, date: selectedDate,
      timeSlot: selectedTimeSlot,
      menu: selectedMenu.name,
      count, note,
      phone,
      menuAnswers,
      commonAnswers,
    };

    try {
      const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(params) });
      const json = await res.json();
      if (json.status === 'success') {
        document.getElementById('modalOverlay').classList.remove('active');
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('completeScreen').classList.add('active');
      } else {
        alert('エラーが発生しました。もう一度お試しください。');
      }
    } catch (e) {
      alert('通信エラーが発生しました。もう一度お試しください。');
    }
  }

  init();
</script>
</body>
</html>
